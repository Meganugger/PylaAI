# Fill this file to import current brawler trophies from the official Brawl Stars API.
# Create an API token at https://developer.brawlstars.com/ and allow your current public IP.

player_tag = "#YOURTAG"
timeout_seconds = 15
api_token = ""

# Optional auto-refresh mode for changing public IPs. Leave disabled unless you
# want PylaAI to log in to the official developer portal and create a new API key.
auto_refresh_token = false
developer_email = ""
developer_password = ""
public_ip_service = "https://api.ipify.org"
key_name_prefix = "PylaAI Auto"
key_description = "Auto-generated by PylaAI for the current public IP."
delete_old_auto_tokens = true

# Dangerous: only set this true if you want PylaAI to delete every API key on your developer account.
delete_all_tokens = false
last_public_ip = ""
